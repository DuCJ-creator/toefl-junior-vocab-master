<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Junior Vocab Master</title>
    <meta name="description" content="A premium vocabulary learning platform for TOEFL Junior preparation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header>
      <div class="logo" id="home-btn" style="cursor: pointer;">
        <span class="logo-icon">▲</span>
        Shirley's TOEFL Junior Vocab Master
      </div>
      <div class="header-actions">
        <button class="btn-challenge" id="challenge-btn">Challenge ME</button>
        <div class="search-container">
          <input type="text" id="global-search" placeholder="Search words, meanings...">
          <div id="search-results" class="search-results hidden"></div>
        </div>
        <button class="star-nav-btn" id="stars-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        </button>
      </div>
    </header>

    <main id="main-content">
      <!-- Dynamic Content -->
    </main>

    <div id="quiz-overlay" class="quiz-overlay hidden">
      <!-- Quiz Content -->
    </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
